    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .khmer-text {
            font-family: 'Kantumruy Pro', sans-serif;
            font-size: 0.8rem;
            color: #475569;
            line-height: 1.2;
        }
        .font-bayon {
            font-family: 'Bayon', sans-serif;
        }
        .chat-bubble {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media print {
            body { background-color: white !important; margin: 0; padding: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 1.5cm; }
            .print-break-avoid { break-inside: avoid; }
        }
    </style>
</head>

        function initTabs() {
            const select = document.getElementById('chapter-select');
            conversationData.forEach((item, index) => {
                const option = document.createElement('option');
                option.value = index;
                // Add padding to the option string
                option.innerHTML = `${item.icon} Chapter ${item.id} - ${item.title}`;
                select.appendChild(option);
            });
        }

        function switchChapter(index) {
            // Update Select UI
            const select = document.getElementById('chapter-select');
            if(select && select.value != index) {
                select.value = index;
            }

            // Update Conversation UI
            const display = document.getElementById('conversation-display');
            const data = conversationData[index];
            
            display.innerHTML = `
                <div class="mb-4">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-sm">Chapter ${data.id}</span>
                        ${data.title}
                    </h2>
                </div>
                <div class="space-y-3">
                    ${data.chat.map((line, i) => {
                        const props = charProps[line.name] || { emoji: "🧑", boxBg: "bg-slate-50", boxBorder: "border-slate-200", nameColor: "text-slate-500" };
                        return `
                        <div class="flex items-start gap-3 chat-bubble" style="animation-delay: ${i * 0.1}s">
                            <div class="flex flex-col items-center flex-shrink-0 w-12 pt-1">
                                <div class="text-3xl leading-none drop-shadow-sm">${props.emoji}</div>
                                <span class="text-[10px] font-bold uppercase tracking-wider mt-1 ${props.nameColor}">${line.name}</span>
                            </div>
                            <div class="flex-grow pt-0.5">
                                <div class="${props.boxBg} py-1 px-3.5 rounded-xl rounded-tl-none border ${props.boxBorder} w-fit shadow-sm">
                                    <p class="text-slate-800 font-bold text-base leading-tight">${line.eng}</p>
                                    <p class="khmer-text mt-0 italic">${line.kh}</p>
                                </div>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function generatePrintLayout() {
            const printContainer = document.getElementById('print-view');
            let printContent = `
                <div class="text-center mb-8 border-b-2 border-slate-800 pb-4">

                data.chat.forEach(line => {
