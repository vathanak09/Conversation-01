<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic English Conversation Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bayon&family=Inter:wght@400;500;600;700&family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .khmer-text {
            font-family: 'Kantumruy Pro', sans-serif;
            font-size: 0.85rem;
            color: #334155;
            line-height: 1.4;
        }
        .font-bayon {
            font-family: 'Bayon', sans-serif;
        }
        .chat-bubble {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media print {
            body { background-color: white !important; margin: 0; padding: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 1.5cm; }
            .print-break-avoid { break-inside: avoid; }
            .print\:hidden { display: none !important; }
        }
        
        /* Loading dots animation */
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);}
            40% { color: inherit; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);}
            60% { text-shadow: .25em 0 0 inherit, .5em 0 0 rgba(0,0,0,0);}
            80%, 100% { text-shadow: .25em 0 0 inherit, .5em 0 0 inherit;}
        }

        /* Custom Scrollbar for Modal */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>

        // --- DRAGGABLE MODAL LOGIC ---
        function initDraggable() {
            const widget = document.getElementById('ai-guide-widget');
            const header = document.getElementById('ai-guide-header');
            
            let isDragging = false;
            let dragStartX, dragStartY;

            const onPointerDown = (e) => {
                // Don't drag if clicking the close button
                if (e.target.closest('button')) return;
                
                isDragging = true;
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                
                const rect = widget.getBoundingClientRect();
                dragStartX = clientX - rect.left;
                dragStartY = clientY - rect.top;
                
                // Switch to fixed left/top instead of transform centering to allow dragging
                widget.style.transform = 'none';
                widget.style.left = rect.left + 'px';
                widget.style.top = rect.top + 'px';
                
                document.addEventListener('mousemove', onPointerMove);
                document.addEventListener('mouseup', onPointerUp);
                document.addEventListener('touchmove', onPointerMove, {passive: false});
                document.addEventListener('touchend', onPointerUp);
            };

            const onPointerMove = (e) => {
                if (!isDragging) return;
                e.preventDefault(); // Prevent scrolling while dragging on touch
                
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                
                let newX = clientX - dragStartX;
                let newY = clientY - dragStartY;
                
                // Keep widget within screen bounds roughly
                newX = Math.max(0, Math.min(newX, window.innerWidth - widget.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - header.offsetHeight));

                widget.style.left = newX + 'px';
                widget.style.top = newY + 'px';
            };

            const onPointerUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onPointerMove);
                document.removeEventListener('mouseup', onPointerUp);
                document.removeEventListener('touchmove', onPointerMove);
                document.removeEventListener('touchend', onPointerUp);
            };

            header.addEventListener('mousedown', onPointerDown);
            header.addEventListener('touchstart', onPointerDown, {passive: false});
        }

        // --- GEMINI API CALL HANDLER ---
        async function callGemini(prompt, expectJson = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let waitTime = 1000;
            
            const requestBody = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            if (expectJson) {
                requestBody.generationConfig = { responseMimeType: "application/json" };
            }

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });
                    if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) return null;
                    await new Promise(r => setTimeout(r, waitTime));
                    waitTime *= 2;
                }
            }
        }

            const btn = document.getElementById('generate-btn');
            
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="loading-dots">✨ AI កំពុងបង្កើតការសន្ទនាថ្មី</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            const history = data.chat.map(c => `${c.name}: ${c.eng}`).join('\n');
            const prompt = `You are an English teacher writing a basic conversation textbook.
The current chapter topic is: "${data.title}".
The conversation so far:
${history}

Generate exactly 2 more short lines to naturally continue this conversation using simple English. Use the same characters.
Provide the response as a JSON array of objects exactly in this format:
[
  {
    "name": "Character Name",
    "eng": "English sentence",
    "kh": "Accurate Khmer translation"
  }
]
Return ONLY valid JSON.`;

            const result = await callGemini(prompt, true);
            
            btn.innerHTML = originalText;
            btn.disabled = false;
            btn.classList.remove('opacity-80', 'cursor-not-allowed');

            if (result) {
                try {
                    const cleanJson = result.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const newLines = JSON.parse(cleanJson);
                    
                    let html = '';
                    
                    html += `<div class="flex flex-col sm:flex-row w-full gap-2 sm:gap-4 items-center sm:items-start justify-between bg-amber-50/50 p-2 rounded-2xl relative border border-amber-100/50">`;
                    
                    if (newLines[0]) {
                        const id1 = `ai-exp-${Date.now()}-0`;
                        html += `<div class="w-full sm:w-1/2 flex justify-start">${generateBubbleHTML(newLines[0], id1, true)}</div>`;
                    }
                    if (newLines[1]) {
                        const id2 = `ai-exp-${Date.now()}-1`;
                        html += `<div class="w-full sm:w-1/2 flex justify-end">${generateBubbleHTML(newLines[1], id2, true)}</div>`;
                    }
                    
                    html += `</div>`;
                    container.insertAdjacentHTML('beforeend', html);

                } catch (e) {
                    console.error("Failed to parse AI JSON:", e, result);
                    alert("មានបញ្ហាក្នុងការបកប្រែទិន្នន័យពី AI។ សូមព្យាយាមម្តងទៀត។");
                }
            } else {
                alert("សុំទោស មានបញ្ហាក្នុងការភ្ជាប់ទៅ AI ពេលនេះ។");
            }
        }

        function initTabs() {
            const select = document.getElementById('chapter-select');
            conversationData.forEach((item, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.innerHTML = `${item.icon} Chapter ${item.id} - ${item.title}`;
                select.appendChild(option);
            });
        }

        // Generate the inner contents of a single chat bubble (Left or Right)
        function generateBubbleHTML(line, uniqueId, isGenerated = false) {
            const props = charProps[line.name] || { emoji: "🧑", boxBg: "bg-slate-50", boxBorder: "border-slate-200", nameColor: "text-slate-500", alignLeft: false };
            
            const isLeft = props.alignLeft;
            const flexDirection = isLeft ? "flex-row" : "flex-row-reverse";
            const borderRadius = isLeft ? "rounded-tl-none" : "rounded-tr-none";
            
            const badgeHTML = isGenerated ? `<span class="absolute -top-2.5 -right-2 bg-amber-400 text-white text-[9px] font-bold px-1.5 py-0.5 rounded shadow-sm z-10">AI</span>` : '';

            return `
                <div class="flex items-center gap-1 ${flexDirection} w-fit relative group max-w-[100%]">
                    <!-- Avatar Area -->
                    <div class="flex flex-col items-center flex-shrink-0 w-10 sm:w-12 pt-0.5 ${isLeft ? 'mr-1 sm:mr-2' : 'ml-1 sm:ml-2'}">
                        <div class="text-3xl leading-none drop-shadow-sm">${props.emoji}</div>
                        <span class="text-[9px] sm:text-[10px] font-bold uppercase tracking-wider mt-1 ${props.nameColor}">${line.name}</span>
                    </div>

                    <!-- Speech Bubble -->
                    <div class="${props.boxBg} py-1.5 px-3 sm:px-4 rounded-xl ${borderRadius} border ${props.boxBorder} w-fit max-w-[220px] sm:max-w-[280px] shadow-sm relative transition-all">
                        ${badgeHTML}
                        <p class="text-slate-800 font-bold text-[14px] sm:text-base leading-tight">${line.eng}</p>
                        <p class="khmer-text mt-0.5 italic text-[11px] sm:text-[0.8rem] text-slate-600">${line.kh}</p>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex gap-1 mx-1 z-10 shrink-0">
                        <button id="btn-${uniqueId}" onclick="explainLine('${uniqueId}', \`${line.eng.replace(/'/g, "\\'")}\`)" class="text-[12px] sm:text-[14px] text-amber-500 hover:text-amber-600 bg-amber-50 hover:bg-amber-100 rounded-full w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center transition-colors shadow-sm border border-amber-100 print:hidden" title="✨ AI ពន្យល់ (Explain Grammar)">
                            ✨
                        </button>
                    </div>
                </div>
            `;
        }

        // Render the whole chapter based on selected index
        function switchChapter(index) {
            const select = document.getElementById('chapter-select');
            if(select && select.value != index) select.value = index;

            const display = document.getElementById('conversation-display');
            const data = conversationData[index];
            
            let htmlContent = `
                <div class="mb-5 flex justify-between items-center border-b border-slate-100 pb-3 px-2">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-sm">Chapter ${data.id}</span>
                        ${data.title}
                    </h2>
                </div>
                <div class="space-y-4" id="main-dialogue-container">
            `;

            for (let i = 0; i < data.chat.length; i += 2) {
                const line1 = data.chat[i];
                const line2 = data.chat[i+1];
                
                const uniqueId1 = `exp-${data.id}-${i}`;
                const bubble1HTML = generateBubbleHTML(line1, uniqueId1, false);
                
                let bubble2HTML = '';
                if (line2) {
                    const uniqueId2 = `exp-${data.id}-${i+1}`;
                    bubble2HTML = generateBubbleHTML(line2, uniqueId2, false);
                }

                htmlContent += `
                    <div class="flex flex-col md:flex-row w-full gap-3 md:gap-4 items-center md:items-start justify-between bg-slate-50/40 p-2 sm:p-3 rounded-2xl relative border border-slate-100/50">
                        <div class="w-full md:w-1/2 flex justify-start">
                            ${bubble1HTML}
                        </div>
                        ${line2 ? `
                        <div class="w-full md:w-1/2 flex justify-end mt-2 md:mt-6">
                            ${bubble2HTML}
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            htmlContent += `
                </div>
                <!-- AI Extracted container -->
                <div id="extra-dialogue-container" class="space-y-4 mt-4"></div>
                
                <!-- AI Generate Button -->
                <div class="mt-8 flex justify-center print:hidden border-t border-slate-100 pt-6">
                    <button id="generate-btn" onclick="generateMoreDialogue()" class="bg-gradient-to-r from-indigo-500 to-blue-600 hover:from-indigo-600 hover:to-blue-700 text-white px-5 py-2.5 rounded-2xl font-bold shadow-md hover:shadow-lg transition-all flex items-center gap-2 text-sm">
                        ✨ បង្កើតការសន្ទនាបន្ត (AI Generate)
                    </button>
                </div>
            `;
            
            display.innerHTML = htmlContent;
        }

        // Generate Print Friendly Version
        function generatePrintLayout() {
            const printContainer = document.getElementById('print-view');
            let printContent = `
                <div class="text-center mb-8 border-b-2 border-slate-800 pb-4">
                    <h2 class="text-xl font-bold uppercase text-slate-700">Brainstorm International School</h2>
                    <p class="font-bayon text-slate-500 text-lg mb-3 tracking-wider">សាលាអន្តរជាតិប្រេនស្តម</p>
                    <h1 class="text-2xl font-medium text-slate-900">English Conversations For K1-SPK Level</h1>
                </div>
                <div class="grid grid-cols-2 gap-x-12 gap-y-8">
            `;

            conversationData.forEach(data => {
                printContent += `
                    <div class="print-break-avoid">
                        <h2 class="text-lg font-bold text-slate-800 mb-3 border-b border-slate-200 pb-1 flex items-center gap-2">
                            <span class="bg-slate-100 px-2 py-0.5 rounded text-sm border border-slate-200">Ch ${data.id}</span>
                            ${data.icon} ${data.title}
                        </h2>
                        <div class="space-y-3">
                `;
                
                data.chat.forEach(line => {
                    const props = charProps[line.name] || { emoji: "🧑", nameColor: "text-slate-500" };
                    printContent += `
                            <div class="flex items-start gap-3">
                                <div class="flex flex-col items-center flex-shrink-0 w-8">
                                    <span class="text-xl leading-none">${props.emoji}</span>
                                    <span class="text-[8px] font-bold uppercase tracking-wider mt-1 ${props.nameColor}">${line.name}</span>
                                </div>
                                <div class="flex-grow pt-0.5">
                                    <p class="text-slate-800 font-bold text-[15px] leading-tight">${line.eng}</p>
                                    <p class="khmer-text mt-0.5 italic text-[12px] text-slate-600">${line.kh}</p>
                                </div>
                            </div>
                    `;
                });

                printContent += `
                        </div>
                    </div>
                `;
            });

            printContent += `</div>`;
            printContainer.innerHTML = printContent;
        }

        window.onload = () => {
            initTabs();
            switchChapter(0); 
            generatePrintLayout();
            initDraggable(); // Initialize Drag feature for AI Guide
        };
    </script>
</body>
</html>
